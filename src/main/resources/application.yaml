spring:
  application:
    name: Home Organizer

  datasource:
    url: jdbc:postgresql://localhost:5432/homeorganizer
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  security:
    jwt:
      # Base64-encoded 256-bit secret. Replace in production via env var APP_SECURITY_JWT_SECRET.
      secret: ${APP_SECURITY_JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1qd3Qtc2VjcmV0LTMyYnl0ZXM=}
      issuer: home-organizer
      access-token-ttl: PT30M
