spring:
  application:
    name: Home Organizer

  datasource:
    url: jdbc:h2:mem:homeorganizer;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  security:
    jwt:
      # Base64-encoded 256-bit secret. Replace in production via env var APP_SECURITY_JWT_SECRET.
      secret: ${APP_SECURITY_JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1qd3Qtc2VjcmV0LTMyYnl0ZXM=}
      issuer: home-organizer
      access-token-ttl: PT30M
